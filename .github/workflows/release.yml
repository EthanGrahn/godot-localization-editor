name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GODOT_VERSION: 4.6
      GODOT_RELEASE: stable

    steps:
      - uses: actions/checkout@v6

      - name: Install Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Export Linux
        run: |
          mkdir -p build
          godot --headless --export-release "Linux/X11" build/GodotLocalizationEditor.x86_64

      - name: Export Linux (No Google)
        run: godot --headless --export-release "Linux/X11 (No Google)" build/GodotLocalizationEditor_NoGoogle.x86_64

      - name: Export Windows
        run: godot --headless --export-release "Windows Desktop" build/GodotLocalizationEditor.exe

      - name: Export Windows (No Google)
        run: godot --headless --export-release "Windows Desktop (No Google)" build/GodotLocalizationEditor_NoGoogle.exe

      - name: Create release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            build/GodotLocalizationEditor.x86_64 \
            build/GodotLocalizationEditor_NoGoogle.x86_64 \
            build/GodotLocalizationEditor.exe \
            build/GodotLocalizationEditor_NoGoogle.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
