name: Export Check

on:
  pull_request:
    branches:
      - main
      - 'v[0-9]*'
  workflow_dispatch:

jobs:
  export-linux:
    name: Export Linux
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.7
      GODOT_RELEASE: stable

    steps:
      - uses: actions/checkout@v6

      - name: Install Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Install custom export templates
        run: |
          TEMPLATE_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          TEMPLATE_TAG=$(gh api repos/${{ github.repository }}/releases \
            --jq ".[] | select(.name == \"Custom Export Templates (Godot ${GODOT_VERSION})\") | .tag_name")
          gh release download "$TEMPLATE_TAG" --repo ${{ github.repository }} \
            --pattern "godot.windows.template_release.x86_64.exe" \
            --pattern "godot.linuxbsd.template_release.x86_64" \
            --dir /tmp/custom-templates
          cp /tmp/custom-templates/godot.windows.template_release.x86_64.exe \
            $TEMPLATE_DIR/windows_release_x86_64.exe
          cp /tmp/custom-templates/godot.linuxbsd.template_release.x86_64 \
            $TEMPLATE_DIR/linux_release_x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Linux
        run: |
          mkdir -p build
          godot --headless --export-release "Linux/X11" build/GodotLocalizationEditor.x86_64

      - name: Verify export artifact
        run: test -f build/GodotLocalizationEditor.x86_64

  export-windows:
    name: Export Windows
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.7
      GODOT_RELEASE: stable

    steps:
      - uses: actions/checkout@v6

      - name: Install Godot
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Install export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          wget -q "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Install custom export templates
        run: |
          TEMPLATE_DIR=~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          TEMPLATE_TAG=$(gh api repos/${{ github.repository }}/releases \
            --jq ".[] | select(.name == \"Custom Export Templates (Godot ${GODOT_VERSION})\") | .tag_name")
          gh release download "$TEMPLATE_TAG" --repo ${{ github.repository }} \
            --pattern "godot.windows.template_release.x86_64.exe" \
            --pattern "godot.linuxbsd.template_release.x86_64" \
            --dir /tmp/custom-templates
          cp /tmp/custom-templates/godot.windows.template_release.x86_64.exe \
            $TEMPLATE_DIR/windows_release_x86_64.exe
          cp /tmp/custom-templates/godot.linuxbsd.template_release.x86_64 \
            $TEMPLATE_DIR/linux_release_x86_64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Export Windows
        run: |
          mkdir -p build
          godot --headless --export-release "Windows Desktop" build/GodotLocalizationEditor.exe

      - name: Verify export artifact
        run: test -f build/GodotLocalizationEditor.exe
